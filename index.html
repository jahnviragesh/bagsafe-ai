<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BagSafe AI</title>

  <!-- FIXED CSS LINKS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>BagSafe AI</h1>

  <button id="fillSampleBtn">Use Sample Data</button>
  <button id="clearBtn">Clear</button>

  <form id="assessmentForm">
    <input name="passengerName" placeholder="Passenger Name" required>
    <input name="bookingReference" placeholder="Booking Ref" required>
    <input name="bagTag" placeholder="Bag Tag" required>
    <input name="flightNumber" placeholder="Flight" required>
    <input name="origin" placeholder="Origin" required>
    <input name="destination" placeholder="Destination" required>

    <input name="layoverMinutes" type="number" placeholder="Layover">
    <input name="transferPoints" type="number" placeholder="Transfers">
    <input name="terminalDistance" type="number" placeholder="Distance">
    <input name="incomingDelay" type="number" placeholder="Delay">
    <input name="checkedBags" type="number" placeholder="Bags">

    <button type="submit">Predict</button>
  </form>

  <h2 id="riskTitle">No result</h2>
  <p id="riskScore"></p>

  <table border="1">
    <thead>
      <tr>
        <th>Passenger</th>
        <th>Flight</th>
        <th>Risk</th>
      </tr>
    </thead>
    <tbody id="recordsTableBody"></tbody>
  </table>

  <!-- FIXED JS LINK -->
  <script src="script.js"></script>

</body>
</html>
